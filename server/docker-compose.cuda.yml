# GPU override for the LLM Service. Use ALONGSIDE the base compose file on an
# NVIDIA host (Linux + nvidia-container-toolkit):
#
#   docker compose -f docker-compose.yml -f docker-compose.cuda.yml up --build -d
#
# It swaps the LLM image for the CUDA build, reserves the GPU, and adds a
# persistent HuggingFace cache so model weights are downloaded only once.
# NOTE: has no effect on Docker Desktop for Mac (no GPU passthrough).
services:
  # llama.cpp server running Qwen3-30B-A3B (MoE: 30B total, ~3.3B active per
  # token) with experts offloaded to CPU RAM (--cpu-moe): attention/KV-cache
  # stay on the GPU, the large sparsely-used expert weights live in system RAM,
  # so the model runs on a 12 GB card. See https://habr.com/ru/articles/961478/.
  #
  # Tuned for this host: RTX 4070 12 GB, 27 GB RAM, 10-core i7-13700 VM.
  # The Q4_K_XL experts (~17.7 GB, 48 layers) are split between GPU and RAM:
  #   -ngl 99 --n-cpu-moe 24 - everything on GPU except 24 layers' experts
  #                            (measured: ~11 GB VRAM, ~9 GB of experts in RAM)
  #   -fa 1 -ctk/-ctv q8_0   - flash attention + quantized KV-cache (VRAM)
  #   -ub/-b 2048            - larger batches recover prompt-processing speed
  #   -t 8                   - leave 2 of the 10 cores for the other services
  #   --jinja                - GGUF chat template (enables Qwen3 tool calling)
  # -c 32768: the plugin's agent prompts (system + tools + file context) start
  # at ~9-10k tokens and grow with every tool round-trip in a multi-step turn.
  # Costs ~0.8 GB VRAM with GQA + q8_0 KV-cache (the model supports up to 256k).
  # Tuning: watch `nvidia-smi` — if VRAM has headroom, lower --n-cpu-moe (more
  # experts on GPU = faster); if it OOMs, raise --n-cpu-moe by 2.
  # The GGUF (~18 GB) is pulled from HuggingFace on first start into llama_cache.
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    restart: unless-stopped
    command: >
      -hf unsloth/Qwen3-30B-A3B-Instruct-2507-GGUF:Q4_K_XL
      --host 0.0.0.0 --port 8080
      -ngl 99 --n-cpu-moe 24
      -fa 1 -ctk q8_0 -ctv q8_0
      -c 32768 -ub 2048 -b 2048
      -t 8 --jinja
    environment:
      LLAMA_CACHE: /root/.cache/llama.cpp
    volumes:
      - llama_cache:/root/.cache/llama.cpp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  llm:
    build:
      dockerfile: llm_service/Dockerfile.cuda
    environment:
      MODELS_FILE: /app/models.cuda.json # adds the heavy Qwen MoE on top of the small model
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./models.cuda.json:/app/models.cuda.json:ro
      - hf_cache:/root/.cache/huggingface
    depends_on:
      llamacpp:
        condition: service_started

volumes:
  hf_cache:
  llama_cache:
